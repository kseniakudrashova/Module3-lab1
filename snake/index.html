<!DOCTYPE html>
<html lang="en">
  <head>
    <title>Home</title>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width" />

    <link rel="stylesheet" href="styles.css" />
    
  </head>
  <body>
    <div id="game-board"></div>
    <div class="controls"></div>
    <p></p>
	<div class="joistick">
		<button onClick="direction='up'">⬆</button>
		<button onClick="direction='left'">⬅</button>
		<button onClick="direction='down'">⬇</button>
		<button onClick="direction='right'">➡</button>
	</div>
	<div>
		<label for="speed">Скорость (мс):</label>
		<input id="speed" type="number" step="50"/>
	</div>
	<div>
		Счет: <span id="score-value"></span>
	</div>
	<script src="script.js"></script>
  </body>
</html>
